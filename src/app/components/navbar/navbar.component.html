<nav [class.scrolled]="scrolled" role="navigation" aria-label="Menú principal">
  <div class="nav-inner">

    <a class="brand" href="#hero" (click)="closeMenu()">
  <img src="assets/logo.jpeg" alt="Logo SABIA" width="80" height="80" style="border-radius: 4px; object-fit: contain;">
  <span>SABIA</span>
</a>

    <ul class="nav-links" [class.open]="menuOpen">
      <li *ngFor="let link of links">
        <a [href]="link.anchor" (click)="closeMenu()">
          {{ link.label }}
        </a>
      </li>

      <li>
        <a href="#cta" class="btn-nav" (click)="closeMenu()">
          Conocer más
        </a>
      </li>
    </ul>

    <button
      class="hamburger"
      (click)="toggle()"
      [class.active]="menuOpen"
      [attr.aria-expanded]="menuOpen"
      aria-label="Abrir menú"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>
</nav>
